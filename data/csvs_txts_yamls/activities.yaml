# Table 11/12: https://proceedings.neurips.cc/paper_files/paper/2022/file/0b11fce9fb449c4171dbec167bf63e12-Supplemental-Datasets_and_Benchmarks.pdf
activities:
  - name: "washing face"
    workspace: "sink with a small tub (32.3 x 24.1 x 2.5 cm^3) in it and two folded wash-cloths on either side of the counter-top, 30 cm from edge closest to patient"
    target_objects: "washcloths, faucet handle, tub"
    instructions:
      - "fill tub with water"
      - "dip right washcloth into water"
      - "wring the washcloth"
      - "wipe each side of face with wet washcloth"
      - "place first washcloth back on countertop"
      - "use washcloth on the left side to dry face"
      - "place second washcloth back on countertop"

  - name: "applying deodorant"
    workspace: "tabletop with deodorant placed at midline, 25 cm from edge closest to patient"
    target_objects: "deodorant (solid twist-base)"
    instructions:
      - "remove deodarant cap"
      - "twist deodarant base"
      - "apply deodorant"
      - "replace deodarant cap"
      - "untwist the deodarant base"
      - "put deodorant on table"

  - name: "hair combing"
    workspace: "tabletop with comb placed at midline, 25 cm from edge closest to patient"
    target_objects: "comb"
    instructions:
      - "pick up comb"
      - "comb both sides of head"

  - name: "don/doffing glasses"
    workspace: "tabletop with glasses placed at midline, 25 cm from edge closest to patient"
    target_objects: "pair of glasses"
    instructions:
      - "wear glasses"
      - "return hands to table"
      - "remove glasses"
      - "place glasses on table"

  - name: "eating"
    workspace: "tabletop with a standard-size paper plate (21.6 cm diameter) placed at midline, 2 cm from edge, utensils placed 3 cm from edge, 5 cm from either side of plate, a baggie with a slice of bread placed 25 cm from edge, 23 cm left of midline, and a margarine packet placed 32 cm from edge, 17 cm right of midline"
    target_objects: "paper plate, fork, knife, re-sealable sandwich baggie, slice of bread, single-serve margarine container"
    instructions:
      - "remove bread from plastic bag"
      - "put bread on plate"
      - "open margarine pack and spread it on bread"
      - "cut bread into four pieces"
      - "cut off the bread"
      - "eat a small bite-sized piece"

  - name: "drinking"
    workspace: "tabletop with water bottle and paper cup 18 cm to the left and right of midline, 25 cm from edge closest to patient"
    target_objects: "water bottle (12 oz), paper cup (4 oz)"
    instructions:
      - "open water bottle"
      - "pour water into cup"
      - "take a sip of water"
      - "place cup on table"
      - "replace cap on bottle"

  - name: "tooth brushing"
    workspace: "sink with toothpaste and toothbrush on either side of the countertop, 30 cm from edge closest to patient"
    target_objects: "travel-sized toothpaste, toothbrush with built-up foam grip, faucet handle"
    instructions:
      - "wet toothbrush"
      - "apply toothpaste to toothbrush"
      - "replace cap on toothpaste tube"
      - "brush teeth"
      - "rinse toothbrush and mouth"
      - "place toothbrush back on countertop"

  - name: "moving object on a horizontal surface"
    workspace: "horizontal circular array (48.5 cm diameter) of 8 targets (5 cm diameter)"
    target_objects: "toilet paper roll wrapped in self-adhesive wrap"
    instructions:
      - "move toilet paper roll from center to first outer target"
      - "move toilet paper roll from first outer target back to center"
      - "move toilet paper roll from center to second outer target"
      - "move toilet paper roll from second outer target back to center"
      - "move toilet paper roll from center to third outer target"
      - "move toilet paper roll from third outer target back to center"
      - "move toilet paper roll from center to fourth outer target"
      - "move toilet paper roll from fourth outer target back to center"
      - "move toilet paper roll from center to fifth outer target"
      - "move toilet paper roll from fifth outer target back to center"
      - "move toilet paper roll from center to sixth outer target"
      - "move toilet paper roll from sixth outer target back to center"
      - "move toilet paper roll from center to seventh outer target"
      - "move toilet paper roll from seventh outer target back to center"
      - "move toilet paper roll from center to eighth outer target"
      - "move toilet paper roll from eighth outer target back to center"

  - name: "moving object on/off a shelf"
    workspace: "shelf with two levels (33 cm and 53 cm) with 3 targets on both levels (22.5 cm, 45 cm, and 67.5 cm away from the left-most edge)"
    target_objects: "toilet paper roll wrapped in self-adhesive wrap"
    instructions:
      - "move the toilet paper roll from center to the first target"
      - "move the toilet paper roll from the first target back to center"
      - "move the toilet paper roll from center to the second target"
      - "move the toilet paper roll from the second target back to center"
      - "move the toilet paper roll from center to the third target"
      - "move the toilet paper roll from the third target back to center"
      - "move the toilet paper roll from center to the fourth target"
      - "move the toilet paper roll from the fourth target back to center"
      - "move the toilet paper roll from center to the fifth target"
      - "move the toilet paper roll from the fifth target back to center"
      - "move the toilet paper roll from center to the sixth target"
      - "move the toilet paper roll from the sixth target back to center"

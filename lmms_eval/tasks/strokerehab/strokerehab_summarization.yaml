# Load StrokeRehab dataset from local
dataset_kwargs:
  use_dataset_builder: !function utils.strokerehab_load_dataset_S0001_small
task: "strokerehab_summarization"
test_split: test
output_type: generate_until
doc_to_visual: !function utils_summarization.sr_summary_doc_to_visual
doc_to_text: !function utils_summarization.sr_summary_doc_to_text
doc_to_target: !function utils_summarization.sr_summary_doc_to_target
generation_kwargs:
  max_new_tokens: 200  # Can be increase
  temperature: 0
  top_p: 1.0
  num_beams: 1
  do_sample: true
process_results: !function utils_summarization.sr_summary_process_results
metric_list:
  - metric: precision
    aggregation: mean
    higher_is_better: true
  - metric: recall
    aggregation: mean
    higher_is_better: true
  - metric: f1
    aggregation: mean
    higher_is_better: true
  - metric: ordering_score
    aggregation: mean
    higher_is_better: true
  - metric: summary_steps_score
    aggregation: mean
    higher_is_better: true
lmms_eval_specific_kwargs:
  default:
    frame_sampling: "uniform"
metadata:
  version: 1.0

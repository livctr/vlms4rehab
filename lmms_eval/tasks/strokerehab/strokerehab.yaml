# Load StrokeRehab dataset from local
dataset_kwargs:
  use_dataset_builder: !function utils.strokerehab_load_dataset_debug
task: "strokerehab"
test_split: test
output_type: generate_until
doc_to_visual: !function utils.sr_summary_doc_to_visual
doc_to_text: !function utils.sr_summary_doc_to_text
doc_to_target: !function utils.sr_summary_doc_to_target
generation_kwargs:
  max_new_tokens: 60  # Can be increase
  temperature: 0
  top_p: 1.0
  num_beams: 1
  do_sample: true
process_results: !function utils.sr_summary_process_results
metric_list:
  - metric: sr_summary_score
    aggregation: !function utils.sr_summary_aggregate_results
    higher_is_better: true
  # ["precision", "recall", "f1", "ordering_score", "summary_steps_score"]
  # - metric: precision
  #   aggregation: !function utils.sr_summary_aggregate_results
  #   higher_is_better: true
  # - metric: recall
  #   aggregation: !function utils.sr_summary_aggregate_results
  #   higher_is_better: true
  # - metric: f1
  #   aggregation: !function utils.sr_summary_aggregate_results
  #   higher_is_better: true
  # - metric: ordering_score
  #   aggregation: !function utils.sr_summary_aggregate_results
  #   higher_is_better: true
  # - metric: summary_steps_score
  #   aggregation: !function utils.sr_summary_aggregate_results
  #   higher_is_better: true
lmms_eval_specific_kwargs:
  default:
    frame_sampling: "uniform"
metadata:
  version: 1.0
